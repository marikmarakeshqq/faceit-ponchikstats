services:
  - type: web
    name: faceit-ponchikstats-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot.web:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FACEIT_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_PATH
        value: data/bot.db
      - key: DEFAULT_POLL_INTERVAL_SEC
        value: "180"
